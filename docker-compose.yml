services:
  redis:
    build:
      context: .
      dockerfile_inline: |
        FROM redis:7.2.6
        RUN apt-get update \
          && apt-get download redis-redisearch=1:1.2.2-4 \
          && dpkg -i --force-depends ./redis-redisearch_1%3a1.2.2-4_amd64.deb \
          && rm ./redis-redisearch_1%3a1.2.2-4_amd64.deb \
          && rm -rf /var/lib/apt/lists/*
    image: agent-worx/redis-redisearch:7.2.6
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--loadmodule",
        "/usr/lib/redis/modules/redisearch.so",
      ]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    build:
      context: .
      dockerfile_inline: |
        FROM postgres:16.4
        RUN apt-get update \
          && apt-get download postgresql-16-pgvector=0.8.2-1.pgdg12+1 \
          && dpkg -i --force-breaks ./postgresql-16-pgvector_0.8.2-1.pgdg12+1_amd64.deb \
          && rm ./postgresql-16-pgvector_0.8.2-1.pgdg12+1_amd64.deb \
          && rm -rf /var/lib/apt/lists/*
        RUN printf '%s\n' \
          "CREATE DATABASE agent_knowledge;" \
          "CREATE DATABASE agent_ops;" \
          "\\connect agent_checkpoints" \
          "CREATE EXTENSION IF NOT EXISTS vector;" \
          "\\connect agent_knowledge" \
          "CREATE EXTENSION IF NOT EXISTS vector;" \
          "\\connect agent_ops" \
          "CREATE EXTENSION IF NOT EXISTS vector;" \
          > /docker-entrypoint-initdb.d/001-agent-databases.sql
    image: agent-worx/postgres-pgvector:16.4
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_checkpoints
    command: ["postgres", "-c", "max_connections=200"]
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_checkpoints"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal-postgres:
    image: postgres:16.4
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.25.2
    depends_on:
      temporal-postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      SKIP_DEFAULT_NAMESPACE_CREATION: "false"
      DEFAULT_NAMESPACE: agent-platform
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
